{% extends 'base.html' %}
{% block content %}

<h1 class="mb-4">Dataset Overview</h1>

<div class="card mb-4">
    <div class="card-body">


    <h5 class="card-title mb-3">Dataset Summary</h5>

    <p><strong>Total Records:</strong> {{ total_records }}</p>

    <p class="mb-2"><strong>Fraud Distribution</strong></p>

    <div style="max-width:250px;">
        <canvas id="fraudChart"></canvas>
    </div>

</div>


</div>

<div class="card">


<div class="card-body">

    <h5 class="card-title mb-3">Sample Records</h5>

    <div class="table-responsive">
        {{ table | safe }}
    </div>

</div>


</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const ctx = document.getElementById('fraudChart');

new Chart(ctx, {
    type: 'doughnut',

    data: {
        labels: ['Non-Fraud', 'Fraud'],

        datasets: [{
            label: 'Number of Claims',

            data: [Number("{{ fraud_no }}"), Number("{{ fraud_yes }}")],

            backgroundColor: [
                '#617891',   // Slate Gray
                '#632024'    // Caput Mortuum
            ],

            borderWidth: 1
        }]
    },

    options: {
        responsive: true,

        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});

</script>

{% endblock %}
