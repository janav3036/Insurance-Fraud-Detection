{% extends 'base.html' %}
{% block content %}

<h1 class="mb-4">Fraud Risk Prediction</h1>

<div class="card mb-4">
<div class="card-body">

<p>
Enter the claim and policyholder details below to evaluate the likelihood
that the claim may be fraudulent. The model will analyze multiple
behavioral and financial indicators before generating a prediction.
</p>

</div>
</div>

<div class="card">
<div class="card-body">

<form method="POST" action="/prediction">

<div class="row g-3">

<div class="col-md-3">
<label class="form-label">Age of Driver</label>
<input type="number" name="age_of_driver" class="form-control" required>
</div>

<div class="col-md-3">
<label class="form-label">Gender</label>
<select name="gender" class="form-select">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Marital Status</label>
<select name="marital_status" class="form-select">
<option>Single</option>
<option>Married</option>
<option>Divorced</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Annual Income</label>
<input type="number" name="annual_income" class="form-control" required>
</div>

<div class="col-md-3">
<label class="form-label">Safety Rating</label>
<input type="number" name="safety_rating" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Higher Education</label>
<select name="high_education" class="form-select">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Recent Address Change</label>
<select name="address_change" class="form-select">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Property Status</label>
<select name="property_status" class="form-select">
<option>Own</option>
<option>Rent</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Claim Date</label>
<input type="date" name="claim_date" id="claim_date" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Claim Day</label>
<select name="claim_day_of_week" id= "claim_day_of_week" class="form-select">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Accident Site</label>
<select name="accident_site" class="form-select">
<option>Highway</option>
<option>Street</option>
<option>Parking Lot</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Past Claims</label>
<input type="number" name="past_num_of_claims" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Witness Present</label>
<select name="witness_present" class="form-select">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Police Report Filed</label>
<select name="police_report" class="form-select">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Liability Percentage</label>
<input type="number" name="liab_prct" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Claim Channel</label>
<select name="channel" class="form-select">
<option>Agent</option>
<option>Online</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Vehicle Age</label>
<input type="number" name="age_of_vehicle" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Vehicle Category</label>
<select name="vehicle_category" class="form-select">
<option>Sedan</option>
<option>SUV</option>
<option>Sports</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Vehicle Price</label>
<input type="number" name="vehicle_price" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Total Claim</label>
<input type="number" name="total_claim" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Injury Claim</label>
<input type="number" name="injury_claim" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Policy Deductible</label>
<input type="number" name="policy_deductible" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Annual Premium</label>
<input type="number" name="annual_premium" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Days Claim Open</label>
<input type="number" name="days_open" class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Form Defects</label>
<select name="form_defects" class="form-select">
<option>Yes</option>
<option>No</option>
</select>
</div>

</div>

<div class="mt-4">

<button class="btn btn-primary btn-lg">
Predict Fraud Risk
</button>

</div>

</form>

</div>
</div>

<script>
    const dateInput = document.getElementById("claim_date")
    const daySelect = document.getElementById("claim_day_of_week")

    const days = [
        "Sunday", 
        "Monday", 
        "Tuesday", 
        "Wednesday", 
        "Thursday", 
        "Friday", 
        "Saturday"
    ]

    dateInput.addEventListener("change", function() {
        const selectedDate = new Date(this.value);
        const dayIndex = selectedDate.getDay();
        const dayName = days[dayIndex];
        daySelect.value = dayName;
    }
);    
</script>

{% endblock %}
